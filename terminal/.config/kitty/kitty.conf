shell /opt/homebrew/bin/bash

allow_remote_control yes
listen_on unix:/tmp/mykitty
# keybinds
kitty_mod alt
map kitty_mod+t new_tab
map kitty_mod+j next_tab
map kitty_mod+k prev_tab
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

# theme

# The basic colors
foreground              #CDD6F4
background              #1e1e2d
selection_foreground    #1e1e2d
selection_background    #F5E0DC

# Cursor colors
cursor                  #F5E0DC
cursor_text_color       #1e1e2d

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Kitty window border colors
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Colors for marks (marked text in the terminal)
mark1_foreground #1e1e2d
mark1_background #B4BEFE
mark2_foreground #1e1e2d
mark2_background #CBA6F7
mark3_foreground #1e1e2d
mark3_background #74C7EC

# The 16 terminal colors

# black
color0 #45475A
color8 #585B70

# red
color1 #F38BA8
color9 #F38BA8

# green
color2  #A6E3A1
color10 #A6E3A1

# yellow
color3  #F9E2AF
color11 #F9E2AF

# blue
color4  #89B4FA
color12 #89B4FA

# magenta
color5  #F5C2E7
color13 #F5C2E7

# cyan
color6  #94E2D5
color14 #94E2D5

# white
color7  #BAC2DE
color15 #A6ADC8

# various looks stuff
# font_family CaskaydiaCove Nerd Font Mono
# font_family JetBrainsMono Nerd Font
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
window_margin_width 0 15 5
padding_padding_width 15
font_size 16
background_opacity 0.6

# hide that mouse
mouse_hide_wait 0.5

# cursor trail
cursor_trail 3
cursor_trail_decay 0.1 0.4

# tabs
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style normal



# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
